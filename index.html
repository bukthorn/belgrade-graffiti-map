<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Belgrade Graffiti Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f4f4f1;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .leaflet-popup-content-wrapper {
      background: #ffffff;
      color: #1f1f1f;
      border-radius: 12px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
    }

    .leaflet-popup-tip {
      background: #ffffff;
    }

    .popup-title {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 8px;
    }

    .popup-row {
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .tag {
      display: inline-block;
      padding: 2px 7px;
      margin: 2px 4px 2px 0;
      border-radius: 999px;
      background: #eeeeee;
      color: #333333;
      font-size: 12px;
    }

    .debug-panel {
      position: absolute;
      z-index: 1000;
      top: 12px;
      left: 50px;
      background: rgba(255, 255, 255, 0.92);
      color: #222;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 12px;
      max-width: 380px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
      line-height: 1.45;
    }

    .custom-graffiti-icon {
      background: transparent;
      border: none;
    }
  </style>
</head>

<body>
  <div id="debug" class="debug-panel">Loading CSV...</div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRhpOdfbetAkVGXD_6hKYAEDtuS2yzQfCX3yR-4YubijnBSIaGnByVcmK1LZQ0Nyotn0MiwiJ-8xyjv/pub?gid=0&single=true&output=csv';

    const debugPanel = document.getElementById('debug');

    const map = L.map('map').setView([44.8084, 20.4773], 16);

    // Light minimalistic CARTO basemap
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    function escapeHtml(value) {
      if (!value) return '';

      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function cleanHeader(header) {
      return String(header || '')
        .replace(/^\uFEFF/, '')
        .trim()
        .toLowerCase();
    }

    function cleanValue(value) {
      return typeof value === 'string' ? value.trim() : value;
    }

    function parseCsv(csvText, delimiter = '') {
      return Papa.parse(csvText, {
        header: true,
        skipEmptyLines: true,
        delimiter: delimiter,
        transformHeader: cleanHeader,
        transform: cleanValue
      });
    }

    function normalizeTag(tag) {
      return String(tag || '')
        .trim()
        .toLowerCase();
    }

    function getTags(item) {
      if (!item.tags) return [];

      return String(item.tags)
        .split(',')
        .map(normalizeTag)
        .filter(Boolean);
    }

    function createMarkerIcon(tags) {
      let svg = '';

      if (tags.includes('football')) {
        svg = `
          <svg width="30" height="30" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
            <circle cx="15" cy="15" r="12" fill="#f7f7f7" stroke="#111111" stroke-width="3"/>
            <circle cx="15" cy="15" r="4" fill="#111111"/>
            <path d="M7 11 L23 19" stroke="#111111" stroke-width="2" stroke-linecap="round"/>
            <path d="M23 11 L7 19" stroke="#111111" stroke-width="2" stroke-linecap="round"/>
          </svg>
        `;
      } else if (tags.includes('politics')) {
        svg = `
          <svg width="30" height="30" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
            <circle cx="15" cy="15" r="12" fill="#8b5a2b" stroke="#d1a06a" stroke-width="3"/>
          </svg>
        `;
      } else {
        svg = `
          <svg width="30" height="30" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
            <circle cx="15" cy="15" r="12" fill="#777777" stroke="#eeeeee" stroke-width="3"/>
          </svg>
        `;
      }

      return L.divIcon({
        className: 'custom-graffiti-icon',
        html: svg,
        iconSize: [30, 30],
        iconAnchor: [15, 15],
        popupAnchor: [0, -15]
      });
    }

    function createPopupContent(item) {
      const originalText = escapeHtml(item.original_text);
      const possibleMeaning = escapeHtml(item.possible_meaning);
      const tags = getTags(item);

      const tagsHtml = tags
        .map(tag => `<span class="tag">${escapeHtml(tag)}</span>`)
        .join('');

      return `
        <div>
          <div class="popup-title">${originalText || 'Untitled graffiti'}</div>

          ${possibleMeaning ? `
            <div class="popup-row">
              <strong>Possible meaning:</strong><br>
              ${possibleMeaning}
            </div>
          ` : ''}

          ${tags.length ? `
            <div class="popup-row">
              <strong>Tags:</strong><br>
              ${tagsHtml}
            </div>
          ` : ''}
        </div>
      `;
    }

    function parseCoordinate(value) {
      if (value === null || value === undefined) return NaN;

      return parseFloat(
        String(value)
          .trim()
          .replace(',', '.')
      );
    }

    function renderGraffitiItems(items) {
      let validPointsCount = 0;
      const bounds = [];

      const firstRow = items[0] || {};
      const columns = Object.keys(firstRow).join(', ');

      console.log('CSV columns:', Object.keys(firstRow));
      console.log('First row:', firstRow);
      console.log('All rows:', items);

      items.forEach(item => {
        const rawLat = item.latitude;
        const rawLng = item.longitude;

        const lat = parseCoordinate(rawLat);
        const lng = parseCoordinate(rawLng);

        if (Number.isNaN(lat) || Number.isNaN(lng)) {
          console.warn('Invalid coordinates:', {
            row: item,
            rawLat,
            rawLng
          });
          return;
        }

        const tags = getTags(item);

        L.marker([lat, lng], {
          icon: createMarkerIcon(tags)
        })
          .addTo(map)
          .bindPopup(createPopupContent(item));

        bounds.push([lat, lng]);
        validPointsCount += 1;
      });

      debugPanel.innerHTML = `
        CSV loaded<br>
        Rows: ${items.length}<br>
        Valid points: ${validPointsCount}<br>
        Columns: ${escapeHtml(columns)}<br>
        First latitude: ${escapeHtml(firstRow.latitude || 'not found')}<br>
        First longitude: ${escapeHtml(firstRow.longitude || 'not found')}
      `;

      if (bounds.length > 0) {
        map.fitBounds(bounds, {
          padding: [60, 60],
          maxZoom: 17
        });
      }
    }

    async function loadCsv() {
      try {
        const response = await fetch(CSV_URL);

        if (!response.ok) {
          throw new Error(`CSV request failed: ${response.status}`);
        }

        const csvText = await response.text();

        // First try: normal CSV from Google Sheets
        let parsed = parseCsv(csvText);

        let firstRow = parsed.data[0] || {};
        let hasCoordinates =
          Object.prototype.hasOwnProperty.call(firstRow, 'latitude') &&
          Object.prototype.hasOwnProperty.call(firstRow, 'longitude');

        // Fallback: if data was inserted as text separated by |
        if (!hasCoordinates) {
          console.warn('Normal CSV parsing did not find latitude/longitude. Trying pipe delimiter...');
          parsed = parseCsv(csvText, '|');
          firstRow = parsed.data[0] || {};

          hasCoordinates =
            Object.prototype.hasOwnProperty.call(firstRow, 'latitude') &&
            Object.prototype.hasOwnProperty.call(firstRow, 'longitude');
        }

        if (parsed.errors.length) {
          console.warn('CSV parsing errors:', parsed.errors);
        }

        renderGraffitiItems(parsed.data);
      } catch (error) {
        console.error(error);

        debugPanel.innerHTML = `
          CSV loading error<br>
          ${escapeHtml(error.message)}
        `;
      }
    }

    loadCsv();
  </script>
</body>
</html>
